<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1 class="sr-only">Frontend Mentor | Product preview card component</h1>
      <div class="card">
        <div class="card__left">
          <picture>
            <source
              srcset="./images/image-product-mobile.jpg"
              media="(max-width: 768px)"
            />
            <img
              class="card__image"
              src="./images/image-product-desktop.jpg"
              width="600"
              height="900"
              alt="Gabrielle Essence Eau De Parfum"
            />
          </picture>
        </div>
        <div class="card__right">
          <span class="card__category">Perfume</span>
          <h2 class="card__title">Gabrielle Essence Eau De Parfum</h2>
          <p class="card__text">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
          <div class="card__prices">
            <strong class="card__price--new">$149.99</strong>
            <del class="card__price--old">$169.99</del>
          </div>
          <button class="card__button">
            <img src="./images/icon-cart.svg" width="15" height="16" alt="" />
            Add to Cart
          </button>
        </div>
      </div>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a
          class="attribution__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="attribution__link"
          href="https://rubendeman.nl"
          target="_blank"
          >Ruben de Man</a
        >.
      </p>
    </footer>
  </body>
</html>
